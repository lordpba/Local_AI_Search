# ─── PrivateSearch — Docker Compose ─────────────────────────
# Prerequisite: Ollama must be running on the host machine.
# Install Ollama: https://ollama.com
# ────────────────────────────────────────────────────────────

services:
  privatesearch:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: privatesearch
    restart: unless-stopped
    user: "${PUID:-1000}:${PGID:-1000}"
    # Cross-platform networking:
    # - expose Gradio on localhost:7860
    # - reach Ollama on the host via host.docker.internal
    ports:
      - "7860:7860"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      # Persistent data: vector store, OCR cache, config
      - privatesearch-data:/data
      # Mount entire home directory read-only so user can browse any folder
      # The app only reads files, never writes to the documents folder
      - "${HOST_HOME_PATH:-/home}:/host-home:ro"
    environment:
      - OLLAMA_HOST=${OLLAMA_HOST:-http://host.docker.internal:11434}
      - PRIVATESEARCH_DATA=/data
      - HOST_HOME_PATH=${HOST_HOME_PATH:-/home}
      - PYTHONUNBUFFERED=1
    healthcheck:
      test: ["CMD", "python", "-c", "import httpx; httpx.get('http://localhost:7860/', timeout=5)"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  privatesearch-data:
    name: privatesearch-data
